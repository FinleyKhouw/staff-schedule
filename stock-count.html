<!DOCTYPE html>
<html lang="en">
<head>
<script>
(function(){
  var SESSION_KEY = 'cb_session';
  var PAGE = window.location.pathname.split('/').pop() || 'index.html';
  try {
    var s = JSON.parse(localStorage.getItem(SESSION_KEY));
    if (!s || !s.name || !s.expiry || Date.now() > s.expiry) {
      localStorage.removeItem(SESSION_KEY);
      window.location.replace('login.html?redirect=' + encodeURIComponent(PAGE));
    }
  } catch(e) { window.location.replace('login.html?redirect=' + encodeURIComponent(PAGE)); }
})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Count — Corebake</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#F7F3EE;--warm-white:#FDFAF6;--brand:#5c0018;--gold:#C9A84C;--gold-light:#F5EDD6;--gold-pale:#FBF7ED;--gold-dark:#8B6914;--teal:#2D6E6E;--teal-light:#D4EAEA;--green:#2D6A4F;--green-light:#D8F3DC;--rose:#A03030;--rose-pale:#F8EAEA;--slate:#4A5568;--slate-light:#EDF0F5;--ink:#1A0A0E;--ink-muted:#6B5560;--ink-faint:#C4AEB6;--border:rgba(92,0,24,0.12);--shadow:0 2px 8px rgba(92,0,24,0.07),0 8px 32px rgba(92,0,24,0.04);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}

  header{background:var(--brand);color:var(--gold);padding:0 1rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(201,168,76,0.15);}
  .hback{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:rgba(201,168,76,0.7);text-decoration:none;}
  .hback svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
  .hcenter{position:absolute;left:50%;transform:translateX(-50%);font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);pointer-events:none;}
  .pbtn{width:32px;height:32px;border-radius:50%;background:rgba(201,168,76,0.15);border:1.5px solid rgba(201,168,76,0.3);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--gold);font-family:'Cormorant Garamond',serif;}

  main{max-width:680px;margin:0 auto;padding:1rem 0.875rem 5rem;}
  .ptitle{font-family:'Cormorant Garamond',serif;font-size:1.6rem;line-height:1.15;margin-bottom:2px;}
  .psub{font-size:11px;color:var(--ink-muted);margin-bottom:0.875rem;}

  .meta-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--warm-white);border:1px solid var(--border);border-radius:10px;margin-bottom:0.875rem;font-size:12px;flex-wrap:wrap;gap:8px;}
  .meta-bar .meta-value{font-weight:600;color:var(--ink);}
  .meta-bar .meta-muted{color:var(--ink-muted);}

  /* GROUP TABS */
  .group-tabs{display:flex;gap:4px;background:var(--warm-white);border:1px solid var(--border);border-radius:10px;padding:4px;margin-bottom:0.875rem;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .group-tab{flex:1;min-width:fit-content;padding:8px 14px;background:none;border:none;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--ink-muted);cursor:pointer;white-space:nowrap;transition:all 0.15s;}
  .group-tab.active{background:var(--brand);color:var(--gold);font-weight:600;}
  .group-tab .tab-count{font-size:10px;opacity:0.7;margin-left:5px;}

  /* SEARCH */
  .search-wrap{position:relative;margin-bottom:0.875rem;}
  .search-input{width:100%;background:var(--warm-white);border:1px solid var(--border);border-radius:10px;padding:9px 12px 9px 32px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);}
  .search-input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,0.13);}
  .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--ink-faint);}

  /* CATEGORY HEADERS */
  .category-section{margin-top:0.875rem;}
  .category-section:first-child{margin-top:0;}
  .category-header{display:flex;align-items:center;gap:6px;padding:8px 4px 6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-faint);border-bottom:1px solid var(--border);margin-bottom:6px;cursor:pointer;user-select:none;transition:color 0.12s;}
  .category-header:hover{color:var(--ink-muted);}
  .category-emoji{font-size:13px;}
  .chevron{margin-left:auto;font-size:11px;color:var(--ink-faint);transition:transform 0.2s;display:inline-block;}
  .category-section.collapsed .chevron{transform:rotate(-90deg);}
  .category-items{}
  .category-section.collapsed .category-items{display:none;}
  .cat-count{color:var(--ink-faint);font-weight:500;font-family:'DM Sans',sans-serif;}

  /* COMPACT ITEM ROW */
  .item-row{background:var(--warm-white);border:1px solid var(--border);border-radius:9px;padding:8px 10px;margin-bottom:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;transition:all 0.12s;}
  .item-row.filled{border-color:var(--gold);background:var(--gold-pale);}
  .item-row.low{border-color:var(--rose);background:var(--rose-pale);}
  .item-row.recorded{background:#F4F8F4;border-color:rgba(45,106,79,0.18);}
  .recorded-row{flex-basis:100%;font-size:11px;color:var(--green);background:white;padding:5px 9px;border-radius:6px;border:1px solid rgba(45,106,79,0.15);margin-top:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;line-height:1.4;}
  .recorded-row strong{color:var(--ink);font-weight:600;}
  .recorded-count{color:var(--ink-muted);font-size:10px;}
  .item-info{flex:1;min-width:0;}
  .item-name{font-size:13px;font-weight:600;color:var(--ink);line-height:1.2;}
  .item-meta{font-size:10px;color:var(--ink-muted);margin-top:1px;display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
  .reorder-tag{color:var(--ink-faint);}
  .reorder-tag.warn{color:var(--rose);font-weight:600;}
  .vendor-tag{color:var(--gold-dark);background:var(--gold-pale);padding:1px 5px;border-radius:4px;font-size:9px;}

  .input-group{display:flex;align-items:center;gap:4px;flex-shrink:0;}
  .count-input{width:60px;background:var(--bg);border:1.5px solid var(--border);border-radius:7px;padding:6px 4px;font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--ink);text-align:center;font-weight:600;}
  .count-input:focus{outline:none;border-color:var(--gold);background:var(--warm-white);}
  .unit-tag{font-size:10px;color:var(--ink-muted);min-width:24px;text-align:left;}

  .note-toggle{background:none;border:none;color:var(--ink-faint);cursor:pointer;font-size:12px;padding:2px 4px;border-radius:4px;}
  .note-toggle:hover{color:var(--ink-muted);background:var(--bg);}
  .note-toggle.active{color:var(--gold-dark);}
  .note-input{display:none;width:100%;margin-top:6px;background:var(--bg);border:1.5px solid var(--border);border-radius:7px;padding:6px 9px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink);flex-basis:100%;}
  .note-input.show{display:block;}
  .note-input:focus{outline:none;border-color:var(--gold);}

  /* VENDOR PILL inside low-stock row */
  .low-vendor-row{flex-basis:100%;font-size:11px;padding:6px 0 2px;color:var(--ink-muted);display:flex;gap:8px;align-items:center;flex-wrap:wrap;border-top:1px solid rgba(160,48,48,0.15);margin-top:4px;}
  .low-vendor-row .low-tag{font-weight:700;color:var(--rose);background:white;padding:2px 8px;border-radius:30px;font-size:10px;letter-spacing:0.04em;}
  .low-vendor-row .vlink{color:var(--gold-dark);text-decoration:none;background:white;padding:2px 8px;border-radius:30px;border:1px solid var(--border);font-weight:500;}
  .low-vendor-row .vlink:hover{background:var(--gold-pale);}

  /* SUBMIT BAR */
  .summary-bar{position:sticky;bottom:0;background:var(--warm-white);border:1px solid var(--border);border-radius:10px;padding:9px 13px;margin-top:0.875rem;display:flex;justify-content:space-between;align-items:center;font-size:12px;box-shadow:0 -4px 16px rgba(92,0,24,0.06);}
  .summary-count{font-weight:600;color:var(--brand);font-size:13px;}
  .low-warn{color:var(--rose);font-weight:500;font-size:11px;}

  .btn-submit{width:100%;background:var(--brand);color:var(--gold);border:none;border-radius:11px;padding:13px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:8px;}
  .btn-submit:hover:not(:disabled){opacity:0.85;}
  .btn-submit:disabled{opacity:0.45;cursor:not-allowed;}
  .spin{width:14px;height:14px;border:2px solid rgba(201,168,76,0.3);border-top-color:var(--gold);border-radius:50%;animation:sp 0.7s linear infinite;display:none;}
  @keyframes sp{to{transform:rotate(360deg);}}
  .errmsg{display:none;background:var(--rose-pale);border:1px solid rgba(160,48,48,0.2);border-radius:9px;padding:9px 13px;font-size:12px;color:var(--rose);margin-top:0.75rem;}

  .scr{display:none;flex-direction:column;align-items:center;text-align:center;padding:2.5rem 1.25rem;gap:12px;background:var(--warm-white);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);}
  .sicon{width:60px;height:60px;background:var(--green-light);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;animation:pop 0.45s cubic-bezier(0.34,1.56,0.64,1);}
  @keyframes pop{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}
  .stitle{font-family:'Cormorant Garamond',serif;font-size:1.5rem;}
  .ssub{font-size:12px;color:var(--ink-muted);line-height:1.6;max-width:340px;}

  .empty-state{text-align:center;padding:2rem 1rem;color:var(--ink-faint);font-size:13px;background:var(--warm-white);border:1px dashed var(--border);border-radius:11px;}
  .loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 1rem;color:var(--ink-muted);font-size:13px;gap:12px;}
  .big-spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:sp 0.8s linear infinite;}
</style>
</head>
<body>

<header>
  <a href="index.html" class="hback">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>Schedule
  </a>
  <div class="hcenter">COREBAKE</div>
  <div class="pbtn"><span id="pinit">?</span></div>
</header>

<main>
  <div class="ptitle">Stock Count</div>
  <div class="psub">Tap a number field, type the count. Skip what you don't count.</div>

  <div class="meta-bar">
    <div><span class="meta-muted">Counter:</span> <span class="meta-value" id="counter-name">—</span></div>
    <div><span class="meta-muted">Date:</span> <span class="meta-value" id="count-date">—</span></div>
  </div>

  <!-- GROUP TABS -->
  <div class="group-tabs" id="group-tabs"></div>

  <!-- SEARCH -->
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="search" class="search-input" id="search-input" placeholder="Search items…" oninput="renderItems()">
  </div>

  <!-- LOADING -->
  <div class="loading-screen" id="loading">
    <div class="big-spinner"></div>
    <div>Loading items…</div>
  </div>

  <!-- ITEMS -->
  <div id="fbody" style="display:none;">
    <div id="items-container"></div>

    <div class="summary-bar">
      <span><span class="summary-count" id="filled-count">0</span> of <span id="total-count">0</span> items counted</span>
      <span class="low-warn" id="low-stock-warn"></span>
    </div>

    <div class="errmsg" id="errmsg"></div>
    <button class="btn-submit" id="bsubmit" onclick="submitForm()">
      <div class="spin" id="spin"></div>
      <span id="blabel">Submit count</span>
    </button>
  </div>

  <!-- SUCCESS -->
  <div class="scr" id="scr">
    <div class="sicon">✓</div>
    <div class="stitle">Count submitted!</div>
    <div class="ssub" id="success-summary">Your count has been recorded.</div>
    <a href="index.html" style="display:inline-block;background:var(--brand);color:var(--gold);border:none;border-radius:9px;padding:11px 24px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;text-decoration:none;margin-top:0.4rem;">Back to Schedule</a>
  </div>
</main>

<script>
const APPS_URL = 'https://script.google.com/macros/s/AKfycbw9XojZYbGbj6mj2mXMKmhv0cten5k5CE-A5xDAJV6WFGsZq-a-4CMybNmflj6Z-cz2mA/exec';

const CATEGORY_EMOJI = {
  'Ingredient':     '🌾',
  'Ingredients':    '🌾',
  'Packaging':      '📦',
  'Finished Goods': '🥐',
  'Finished goods': '🥐',
  'Beverage':       '🥤',
  'Drink':          '🥤',
  'Equipment':      '🔧',
  'Cleaning':       '🧼',
  'Other':          '📋',
};

let sess = null;
let masterItems = [];
let counts = {};
let activeGroup = 'All';
let availableGroups = [];
let todayCounts = {}; // itemName → { counter, time, count }

function localDateStr(d) {
  const dt = d || new Date();
  return dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
}

async function loadMasterItems() {
  try {
    // Load items first (critical), then today's counts (optional)
    const itemsRes  = await fetch(APPS_URL + '?action=getMasterItems&t=' + Date.now(), { cache: 'no-store' });
    const itemsData = await itemsRes.json();

    if (itemsData.result !== 'success') throw new Error('Items API failed');
    masterItems = itemsData.items || [];

    // Load today's counts separately — don't fail if endpoint missing
    todayCounts = {};
    try {
      const todayRes  = await fetch(APPS_URL + '?action=getTodayCounts&t=' + Date.now(), { cache: 'no-store' });
      const todayData = await todayRes.json();
      if (todayData.result === 'success') {
        (todayData.counts || []).forEach(c => { todayCounts[c.name] = c; });
      }
    } catch(e) {
      console.warn('Today counts not available:', e);
    }

    buildGroupTabs();
    renderItems();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('fbody').style.display = 'block';
  } catch(e) {
    console.error('Load failed:', e);
    document.getElementById('loading').innerHTML =
      '<div style="text-align:center;color:var(--rose);">Failed to load.<br><small>' + (e.message || 'Check the MasterItems sheet.') + '</small></div>';
  }
}

function buildGroupTabs() {
  const groups = [...new Set(masterItems.map(i => i.group || 'Other'))].sort();
  availableGroups = groups;
  const tabsContainer = document.getElementById('group-tabs');
  if (groups.length <= 1 && (!groups[0] || groups[0] === 'Other')) {
    tabsContainer.style.display = 'none';
    activeGroup = 'All';
    return;
  }
  const allButton = `<button class="group-tab ${activeGroup==='All'?'active':''}" onclick="switchGroup('All')">All <span class="tab-count">${masterItems.length}</span></button>`;
  const groupButtons = groups.map(g => {
    const count = masterItems.filter(i => (i.group || 'Other') === g).length;
    return `<button class="group-tab ${activeGroup===g?'active':''}" onclick="switchGroup('${escapeAttr(g)}')">${escapeHTML(g)} <span class="tab-count">${count}</span></button>`;
  }).join('');
  tabsContainer.innerHTML = allButton + groupButtons;
}

function switchGroup(g) {
  activeGroup = g;
  buildGroupTabs();
  renderItems();
}

function getFilteredItems() {
  const search = document.getElementById('search-input').value.trim().toLowerCase();
  return masterItems.filter(i => {
    if (activeGroup !== 'All' && (i.group || 'Other') !== activeGroup) return false;
    if (search && !i.name.toLowerCase().includes(search)) return false;
    return true;
  });
}

function renderItems() {
  const items = getFilteredItems();
  const container = document.getElementById('items-container');

  if (!items.length) {
    container.innerHTML = `<div class="empty-state">No items found${activeGroup !== 'All' ? ' in ' + activeGroup : ''}.</div>`;
    document.getElementById('total-count').textContent = '0';
    return;
  }

  // Group by category within the active group
  const byCategory = {};
  items.forEach(i => {
    const c = i.category || 'Other';
    if (!byCategory[c]) byCategory[c] = [];
    byCategory[c].push(i);
  });

  // Sort categories alphabetically
  const sortedCategories = Object.keys(byCategory).sort();

  let html = '';
  sortedCategories.forEach(cat => {
    const emoji = CATEGORY_EMOJI[cat] || '📋';
    const catId = 'cat-' + slugify(cat);
    html += `
      <div class="category-section" id="${catId}">
        <div class="category-header" onclick="toggleCategory('${escapeAttr(cat)}')">
          <span class="category-emoji">${emoji}</span>
          <span>${escapeHTML(cat)}</span>
          <span class="cat-count">${byCategory[cat].length}</span>
          <span class="chevron">▼</span>
        </div>
        <div class="category-items">
          ${byCategory[cat].map(renderItemRow).join('')}
        </div>
      </div>`;
  });

  container.innerHTML = html;
  document.getElementById('total-count').textContent = items.length;
  // Restore filled state for visible items
  Object.keys(counts).forEach(name => {
    if (counts[name].count !== undefined) {
      const inputEl = document.querySelector(`[data-name="${cssEscape(name)}"]`);
      if (inputEl) {
        inputEl.value = counts[name].count;
        updateRowVisuals(name, counts[name].count);
      }
    }
  });
  updateSummary();
}

function renderItemRow(item) {
  const id = 'item-' + slugify(item.name);
  const reorderText = item.reorderPoint > 0 ? `Min ${item.reorderPoint}` : '';
  const recorded = todayCounts[item.name];
  return `
    <div class="item-row${recorded ? ' recorded' : ''}" id="${id}">
      <div class="item-info">
        <div class="item-name">${escapeHTML(item.name)}</div>
        <div class="item-meta">
          ${reorderText ? `<span class="reorder-tag" id="${id}-reorder">${escapeHTML(reorderText)}</span>` : ''}
          ${item.vendor ? `<span class="vendor-tag">📞 ${escapeHTML(item.vendor)}</span>` : ''}
        </div>
      </div>
      <div class="input-group">
        <input type="number" inputmode="decimal" step="0.01" min="0" class="count-input" placeholder="0"
          data-name="${escapeAttr(item.name)}"
          oninput="onCountChange('${escapeAttr(item.name)}', this.value)">
        <span class="unit-tag">${escapeHTML(item.unit || '')}</span>
        <button class="note-toggle" id="${id}-notebtn" onclick="toggleNote('${escapeAttr(item.name)}')" title="Add note">✎</button>
      </div>
      <input type="text" class="note-input" id="${id}-note" placeholder="Add note…"
        oninput="onNoteChange('${escapeAttr(item.name)}', this.value)">
      ${recorded ? `<div class="recorded-row">✅ Recorded by <strong>${escapeHTML(recorded.counter)}</strong> at <strong>${escapeHTML(recorded.time)}</strong> · <span class="recorded-count">${escapeHTML(String(recorded.count))} ${escapeHTML(item.unit||'')}</span></div>` : ''}
    </div>`;
}

function toggleCategory(cat) {
  const catId = 'cat-' + slugify(cat);
  const section = document.getElementById(catId);
  if (section) section.classList.toggle('collapsed');
}

function toggleNote(name) {
  const id = 'item-' + slugify(name);
  const noteEl = document.getElementById(id + '-note');
  const btnEl  = document.getElementById(id + '-notebtn');
  const isShown = noteEl.classList.toggle('show');
  if (isShown) {
    btnEl.classList.add('active');
    noteEl.focus();
  } else {
    btnEl.classList.remove('active');
  }
}

function onCountChange(name, value) {
  if (value === '' || value === null) {
    if (counts[name]) delete counts[name].count;
    if (counts[name] && !counts[name].note) delete counts[name];
  } else {
    counts[name] = counts[name] || {};
    counts[name].count = parseFloat(value);
  }
  updateRowVisuals(name, value);
  updateSummary();
}

function onNoteChange(name, value) {
  counts[name] = counts[name] || {};
  if (value.trim()) counts[name].note = value.trim();
  else delete counts[name].note;
  if (counts[name].count === undefined && !counts[name].note) delete counts[name];
}

function updateRowVisuals(name, value) {
  const id  = 'item-' + slugify(name);
  const row = document.getElementById(id);
  if (!row) return;
  row.classList.remove('filled', 'low');
  // Remove any prior low-vendor row
  const existingVendorRow = row.querySelector('.low-vendor-row');
  if (existingVendorRow) existingVendorRow.remove();

  const reorderTag = document.getElementById(id + '-reorder');
  if (reorderTag) reorderTag.classList.remove('warn');

  if (value === '' || value === null) return;

  const item = masterItems.find(i => i.name === name);
  const count = parseFloat(value);
  if (item && item.reorderPoint > 0 && count < item.reorderPoint) {
    row.classList.add('low');
    if (reorderTag) reorderTag.classList.add('warn');
    // Add vendor info inline if available
    if (item.vendor || item.vendorContact) {
      const vendorRow = document.createElement('div');
      vendorRow.className = 'low-vendor-row';
      vendorRow.innerHTML = `
        <span class="low-tag">⚠ LOW</span>
        ${item.vendor ? `<span>📞 <strong style="color:var(--ink);">${escapeHTML(item.vendor)}</strong></span>` : ''}
        ${item.vendorContact ? `<a href="${vendorContactLink(item.vendorContact)}" target="_blank" class="vlink">${escapeHTML(item.vendorContact)}</a>` : ''}
      `;
      row.appendChild(vendorRow);
    }
  } else {
    row.classList.add('filled');
  }
}

function vendorContactLink(s) {
  const v = String(s).trim();
  if (/^\+?\d[\d\s-]+$/.test(v)) {
    // Looks like a phone number → WhatsApp link
    const digits = v.replace(/\D/g, '');
    return `https://wa.me/${digits}`;
  }
  if (v.includes('@')) return `mailto:${v}`;
  if (v.startsWith('http')) return v;
  return '#';
}

function updateSummary() {
  const filled = Object.keys(counts).filter(k => counts[k].count !== undefined).length;
  document.getElementById('filled-count').textContent = filled;
  let lowCount = 0;
  Object.keys(counts).forEach(name => {
    const item = masterItems.find(i => i.name === name);
    if (item && item.reorderPoint > 0 && counts[name].count < item.reorderPoint) lowCount++;
  });
  document.getElementById('low-stock-warn').textContent = lowCount > 0 ? `⚠ ${lowCount} low` : '';
}

function validate() {
  const filled = Object.keys(counts).filter(k => counts[k].count !== undefined).length;
  if (filled === 0) return 'Please count at least one item.';
  return null;
}

async function submitForm() {
  const errEl = document.getElementById('errmsg');
  errEl.style.display = 'none';
  const err = validate();
  if (err) { errEl.textContent = err; errEl.style.display = 'block'; return; }

  // Warn if any items being submitted were already counted today
  const duplicates = Object.keys(counts)
    .filter(k => counts[k].count !== undefined && todayCounts[k]);
  if (duplicates.length > 0) {
    const list = duplicates.slice(0, 5).map(n => {
      const r = todayCounts[n];
      return `• ${n} — already counted by ${r.counter} at ${r.time}`;
    }).join('\n');
    const more = duplicates.length > 5 ? `\n…and ${duplicates.length - 5} more` : '';
    const ok = confirm(`⚠️ ${duplicates.length} item${duplicates.length>1?'s have':' has'} already been counted today:\n\n${list}${more}\n\nSubmit anyway? (Will create a new count entry)`);
    if (!ok) return;
  }

  const btn = document.getElementById('bsubmit');
  const sp  = document.getElementById('spin');
  const lbl = document.getElementById('blabel');
  btn.disabled = true; sp.style.display = 'block'; lbl.textContent = 'Submitting…';

  const entries = Object.keys(counts)
    .filter(k => counts[k].count !== undefined)
    .map(name => {
      const item = masterItems.find(i => i.name === name);
      return {
        name,
        category: item?.category || '',
        group:    item?.group || '',
        unit:     item?.unit || '',
        count:    counts[name].count,
        reorder:  item?.reorderPoint || 0,
        vendor:   item?.vendor || '',
        vendorContact: item?.vendorContact || '',
        note:     counts[name].note || '',
      };
    });

  const payload = {
    formType:  'stockCount',
    timestamp: new Date().toLocaleString('en-GB'),
    date:      localDateStr(),
    counter:   sess.name,
    role:      sess.role,
    entries:   entries,
  };

  try {
    await fetch(APPS_URL, {
      method: 'POST', mode: 'no-cors',
      headers:{ 'Content-Type':'text/plain' },
      body:   JSON.stringify(payload),
    });
    document.getElementById('fbody').style.display = 'none';
    document.getElementById('group-tabs').style.display = 'none';
    document.querySelector('.search-wrap').style.display = 'none';
    document.querySelector('.meta-bar').style.display = 'none';
    document.getElementById('scr').style.display = 'flex';
    document.getElementById('success-summary').textContent =
      `${entries.length} item${entries.length>1?'s':''} counted. Thank you, ${sess.name.split(' ')[0]}!`;
  } catch(e) {
    errEl.textContent = 'Submission failed. Try again.';
    errEl.style.display = 'block';
    btn.disabled = false; sp.style.display = 'none'; lbl.textContent = 'Submit count';
  }
}

function escapeHTML(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}
function escapeAttr(s) { return escapeHTML(s).replace(/'/g, '&#39;'); }
function cssEscape(s)  { return String(s).replace(/"/g, '\\"'); }
function slugify(s)    { return String(s).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, ''); }

document.addEventListener('DOMContentLoaded', () => {
  try {
    const s = JSON.parse(localStorage.getItem('cb_session'));
    if (s && s.name) {
      sess = s;
      document.getElementById('counter-name').textContent = s.name;
      document.getElementById('pinit').textContent = s.name.charAt(0).toUpperCase();
    }
  } catch(e) {}

  const now = new Date();
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('count-date').textContent =
    `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;

  loadMasterItems();
});
</script>
